<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AI Gaming Blog</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="AI Gaming Blog – cheats, tips, reviews and gameplay videos for popular games." name="description"/>
<style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        h1, h2 { color: #333; }
        a { text-decoration: none; color: #1a0dab; }
        a:hover { text-decoration: underline; }
        #posts a { display: block; margin-bottom: 8px; }
        img.cover { width: 100%; max-width: 800px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
<header>
<h1>AI Gaming Blog</h1>
<p>Cheats, tips, reviews and gameplay videos for popular games.</p>
</header>
<section>
<h2>Latest Posts</h2>
<div id="posts">
<!-- AUTO-GENERATED POSTS START -->
<!-- Posts will be inserted here by generate_and_save.py -->
<!-- AUTO-GENERATED POSTS END -->
</div>
</section>
<section>
<h2>Search Posts</h2>
<input id="search" placeholder="Search posts..." style="width:100%; padding:8px; margin-bottom:20px;" type="text"/>
<ul id="search-results"></ul>
</section>
<footer>
<hr/>
<p style="font-size:12px; color:#666;">
            © <span id="year"></span> AI Gaming Blog. All rights reserved.<br/>
            Comment Policy: No spam, ads, offensive language, or disallowed topics. All comments are moderated.
        </p>
</footer>
<script>
        // Update year dynamically
        document.getElementById("year").textContent = new Date().getFullYear();

        // Search functionality
        const searchInput = document.getElementById("search");
        const searchResults = document.getElementById("search-results");

        searchInput.addEventListener("input", function() {
            const query = this.value.toLowerCase();
            searchResults.innerHTML = "";
            const posts = document.querySelectorAll("#posts a");
            posts.forEach(post => {
                if(post.textContent.toLowerCase().includes(query)) {
                    const li = document.createElement("li");
                    const a = document.createElement("a");
                    a.href = post.href;
                    a.textContent = post.textContent;
                    li.appendChild(a);
                    searchResults.appendChild(li);
                }
            });
        });
    </script>
</body>
</html>
